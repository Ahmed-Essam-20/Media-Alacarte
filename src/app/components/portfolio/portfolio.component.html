<section id="portfolio" class="portfolio-section section">
  <h2>Our Portfolio</h2>

  <div class="portfolio-grid">
    @for (item of portfolioItems; track item.title) {
      <div class="portfolio-card">
        <img [src]="item.image" [alt]="item.title" />
        <div class="overlay">
          <h3>{{ item.title }}</h3>
        </div>
      </div>
    }
  </div>
</section>
