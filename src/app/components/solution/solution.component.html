<section id="solution" class="solution section">
  <p class="small">WHY MEDIA A LA CARTE?</p>

  <h2>
    Our All <span class="highlight">Solution</span> for<br />
    Smarter Media Buying
  </h2>

  <!-- Banner -->
  <div class="banner">
    <img src="/assets/media/solution-banner.jpg" alt="Solution Banner" />
    <div class="banner-overlay">
      <p>
        We simplify media buying with data, automation, and collaboration to maximize ROI.
      </p>
      <button class="btn">Get Started</button>
    </div>
  </div>

  <!-- Feature Grid -->
  <div class="features">
    @for (f of features; track f.title) {
      <div class="feature" [class.highlight]="f.highlight">
        <div class="icon">{{ f.icon }}</div>
        <h3>{{ f.title }}</h3>
        <p>{{ f.desc }}</p>
        <span class="arrow">↗</span>
      </div>
    }
  </div>
</section>
